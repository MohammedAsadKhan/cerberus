name: NIST Rules Update Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-nist-update:
    name: Check NIST SP 800-63B for Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch and parse NIST SP 800-63B
        run: python scripts/fetch_nist.py

      - name: Compare hash against stored baseline
        id: compare
        run: |
          CURRENT_HASH=$(cat nist_current_hash.txt)
          STORED_HASH="none"
          if [ -f ".github/nist_baseline_hash.txt" ]; then
            STORED_HASH=$(cat .github/nist_baseline_hash.txt)
          fi
          echo "Stored hash:  $STORED_HASH"
          echo "Current hash: $CURRENT_HASH"
          if [ "$CURRENT_HASH" != "$STORED_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "current_hash=$CURRENT_HASH" >> $GITHUB_OUTPUT
            echo "::notice::NIST SP 800-63B change detected. A review PR will be opened."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::No changes detected. Rules are current."
          fi

      - name: Generate diff report
        if: steps.compare.outputs.changed == 'true'
        run: python scripts/generate_report.py

      - name: Update baseline hash
        if: steps.compare.outputs.changed == 'true'
        run: |
          mkdir -p .github
          cp nist_current_hash.txt .github/nist_baseline_hash.txt

      - name: Configure git
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nist-rules-update/${{ steps.compare.outputs.current_hash }}
          base: main
          title: "[NIST] SP 800-63B change detected — rules review required"
          body-path: NIST_CHANGE_REPORT.md
          commit-message: "chore: update NIST baseline hash after detected change"
          labels: |
            compliance
            rules-update
            needs-review
          add-paths: |
            .github/nist_baseline_hash.txt

      - name: Report status
        run: |
          if [ "${{ steps.compare.outputs.changed }}" == "true" ]; then
            echo "Change detected. Pull request opened for review."
          else
            echo "No changes detected. Cerberus rules are current with NIST SP 800-63B."
          fi
